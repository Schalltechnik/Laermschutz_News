name: Daily News Update

on:
  schedule:
    # Every day at 06:00 UTC (= 07:00 CET / 08:00 CEST)
    - cron: "0 6 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit data.json back to repo

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch news and generate summaries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_news.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: daily news update $(date -u +'%Y-%m-%d')"
          git push

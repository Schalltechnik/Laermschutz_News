name: Lärmschutz News Update

on:
  schedule:
    # ── Daily news fetch: 05:00 Graz time ──────────────────────────────────────
    # Graz = UTC+1 (CET) in winter, UTC+2 (CEST) in summer
    # We use 03:00 UTC which covers both: 04:00 CET and 05:00 CEST
    # For exact 05:00 Graz we pick 03:00 UTC (close enough year-round)
    - cron: "0 3 * * *"

    # ── Weekly Executive Summary: Thursday 22:00 Graz time ─────────────────────
    # 22:00 CET (winter) = 21:00 UTC → use 20:00 UTC to cover summer too
    # Thu = weekday 4 in Python (0=Mon), cron day-of-week 4 = Thursday
    - cron: "0 20 * * 4"

    # ── Monthly Executive Summary: last day of month, 12:00 Graz time ──────────
    # "Last day of month" is not directly supported in cron.
    # We schedule on the 28th, 29th, 30th, 31st at 10:00 UTC (12:00 CET)
    # and let the Python script check if tomorrow is the 1st (= today is last day).
    - cron: "0 10 28-31 * *"

  workflow_dispatch:
    inputs:
      mode:
        description: 'What to run'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly_summary
          - monthly_summary

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine run mode
        id: mode
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.mode }}"

          if [ "$MANUAL" = "weekly_summary" ]; then
            echo "WEEKLY_SUMMARY=true"  >> $GITHUB_ENV
            echo "MONTHLY_SUMMARY=false" >> $GITHUB_ENV
            echo "Mode: manual weekly summary"

          elif [ "$MANUAL" = "monthly_summary" ]; then
            echo "WEEKLY_SUMMARY=false"  >> $GITHUB_ENV
            echo "MONTHLY_SUMMARY=true"  >> $GITHUB_ENV
            echo "Mode: manual monthly summary"

          elif [ "$SCHEDULE" = "0 20 * * 4" ]; then
            echo "WEEKLY_SUMMARY=true"  >> $GITHUB_ENV
            echo "MONTHLY_SUMMARY=false" >> $GITHUB_ENV
            echo "Mode: scheduled weekly summary (Thursday)"

          elif [ "$SCHEDULE" = "0 10 28-31 * *" ]; then
            echo "WEEKLY_SUMMARY=false"  >> $GITHUB_ENV
            echo "MONTHLY_SUMMARY=true"  >> $GITHUB_ENV
            echo "Mode: scheduled monthly summary (last day check)"

          else
            echo "WEEKLY_SUMMARY=false"  >> $GITHUB_ENV
            echo "MONTHLY_SUMMARY=false" >> $GITHUB_ENV
            echo "Mode: daily news only"
          fi

      - name: Fetch news and generate summaries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_news.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git add docs/summary.html    2>/dev/null || true
          git add docs/summary_monthly.html 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: news update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

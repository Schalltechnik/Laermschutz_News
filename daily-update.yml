name: Daily News Update

on:
  schedule:
    # Daily at 06:00 UTC (07:00 CET / 08:00 CEST)
    - cron: "0 6 * * *"
    # Weekly executive summary every Friday at 06:00 UTC
    - cron: "0 6 * * 5"
  workflow_dispatch:
    inputs:
      weekly_summary:
        description: 'Generate weekly summary?'
        required: false
        default: 'false'

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch news and generate summaries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Enable weekly summary on Fridays or manual trigger
          WEEKLY_SUMMARY: ${{ (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 6 * * 5')) && 'true' || github.event.inputs.weekly_summary || 'false' }}
        run: python fetch_news.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/summary.html
          git diff --cached --quiet || git commit -m "chore: daily news update $(date -u +'%Y-%m-%d')"
          git push

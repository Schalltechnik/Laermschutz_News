name: Daily News Update

on:
  schedule:
    # Daily Mon–Thu + Sat–Sun at 06:00 UTC (without weekly summary)
    - cron: "0 6 * * 0,1,2,3,4,6"
    # Friday at 06:00 UTC – with weekly summary
    - cron: "0 6 * * 5"
  workflow_dispatch:

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch news and generate summaries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # On Fridays (day 5) set WEEKLY_SUMMARY=true automatically
          WEEKLY_SUMMARY: ${{ (github.event.schedule == '0 6 * * 5') && 'true' || 'false' }}
        run: python fetch_news.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git add docs/summary.html 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: daily news update $(date -u +'%Y-%m-%d')"
          git push

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter abmelden – Lärmschutz News Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #1a5c38; --border: #d4e4d4; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f4f0; color: #1a1a1a; min-height: 100vh; padding: 60px 20px; text-align: center; }
    .card { max-width: 420px; margin: 0 auto; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 40px 32px; box-shadow: 0 2px 16px rgba(26,92,56,0.08); }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 20px; }
    .btn { display: inline-block; padding: 10px 24px; background: #c8102e; color: #fff; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn:hover { background: #a00d24; }
    .back { display: block; margin-top: 16px; font-size: 13px; color: var(--green); text-decoration: none; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
    .msg.success { background: #e8f2ec; border: 1px solid #b8d4b8; color: var(--green); }
    #email-display { font-weight: 600; color: var(--green); }
  </style>
</head>
<body>
<div class="card">
  <h1>Newsletter abmelden</h1>
  <p>Sie möchten sich von der E-Mail-Adresse <span id="email-display"></span> abmelden?</p>
  <button class="btn" onclick="unsubscribe()">Jetzt abmelden</button>
  <div class="msg success" id="msg-success">✅ Sie wurden erfolgreich abgemeldet.</div>
  <a class="back" href="index.html">← Zurück zur Übersicht</a>
</div>

<script>
  const GITHUB_OWNER = "Schalltechnik";
  const GITHUB_REPO  = "Laermschutz_News";

  const params = new URLSearchParams(window.location.search);
  const email  = params.get("email") || "";
  document.getElementById("email-display").textContent = email || "(unbekannt)";

  async function unsubscribe() {
    if (!email) return;
    try {
      await fetch(
        `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/dispatches`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/vnd.github+json" },
          body: JSON.stringify({ event_type: "unsubscribe", client_payload: { email } }),
        }
      );
    } catch(e) { /* best effort */ }
    document.getElementById("msg-success").style.display = "block";
    document.querySelector(".btn").style.display = "none";
  }
</script>
</body>
</html>

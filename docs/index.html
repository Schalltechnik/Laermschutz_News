<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lärmschutz News Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f0;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --muted: #777;
      --border: #e2e2e2;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: #1a1a1a;
      color: #fff;
      padding: 28px 24px 24px;
      text-align: center;
    }
    header .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
      font-size: clamp(20px, 4vw, 32px);
      margin-bottom: 8px;
    }
    header .meta {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }
    header .meta span { color: rgba(255,255,255,0.75); font-weight: 600; }

    /* ── Summary Link ── */
    .summary-link-bar {
      text-align: center;
      padding: 12px 16px 0;
    }
    .summary-link-bar a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .summary-link-bar a:hover { background: #333; }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      overflow-x: auto;
      gap: 0;
      padding: 20px 16px 0;
      max-width: 900px;
      margin: 0 auto;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      background: #e8e8e4;
      color: #666;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      margin-right: 4px;
      white-space: nowrap;
    }
    .tab-btn:hover { background: #ddd; color: #333; }
    .tab-btn.active {
      background: #fff;
      color: #1a1a1a;
      border-bottom-color: #fff;
      position: relative;
      z-index: 2;
    }
    .tab-btn .tab-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Tab Content ── */
    .tab-content-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px 0;
    }
    .tab-panel {
      display: none;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 0 8px 8px 8px;
      padding: 24px;
    }
    .tab-panel.active { display: block; }

    /* ── Category Header inside panel ── */
    .panel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .panel-icon { font-size: 28px; }
    .panel-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .panel-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── AI Summary ── */
    .summary-box {
      background: #f8f8f6;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 20px;
    }
    .summary-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .summary-text {
      font-size: 14px;
      line-height: 1.7;
      color: #333;
    }

    /* ── News Items ── */
    .news-item {
      border-top: 1px solid var(--border);
      padding: 13px 0;
    }
    .news-item:first-child { border-top: none; }
    .news-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      text-decoration: none;
      display: block;
      margin-bottom: 4px;
      transition: opacity 0.15s;
    }
    .news-title:hover { opacity: 0.65; }
    .news-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .news-source { font-size: 11px; color: var(--muted); font-weight: 500; }
    .news-date { font-size: 11px; color: #bbb; }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

    footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: #bbb;
    }
    footer a { color: #999; }
  </style>
</head>
<body>

<header>
  <div class="badge">🔊 Lärmschutz News Monitor</div>
  <h1>Ihr täglicher Nachrichtenradar</h1>
  <p class="meta">Automatisch aktualisiert · Zuletzt: <span id="generated">wird geladen…</span></p>
</header>

<div class="summary-link-bar">
  <a href="summary.html">📄 Wöchentlicher Executive Summary</a>
</div>

<div class="tab-bar" id="tab-bar">
  <!-- tabs injected by JS -->
</div>

<div class="tab-content-wrapper">
  <div id="panels">
    <!-- panels injected by JS -->
  </div>
</div>

<footer>
  Powered by <a href="https://ai.google.dev" target="_blank">Google Gemini</a> &amp; GitHub Actions
</footer>

<script>
  const CAT_ORDER = ["steiermark", "austria", "dach", "europe", "science"];
  const CAT_SUBS = {
    steiermark: "Lokale Meldungen Steiermark & Graz",
    austria:    "Nationale Meldungen Österreich",
    dach:       "Deutschland, Österreich, Schweiz",
    europe:     "EU & europäische Politik",
    science:    "Forschung & Technik",
  };

  function escHtml(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function activateTab(catId) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === catId));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.dataset.cat === catId));
  }

  async function load() {
    try {
      const res  = await fetch("data.json?v=" + Date.now());
      if (!res.ok) throw new Error("data.json not found");
      const data = await res.json();

      document.getElementById("generated").textContent = data.generated || "unbekannt";

      const tabBar = document.getElementById("tab-bar");
      const panels = document.getElementById("panels");
      tabBar.innerHTML = "";
      panels.innerHTML = "";

      let firstCat = null;

      for (const catId of CAT_ORDER) {
        const cat = data.categories[catId];
        if (!cat) continue;
        if (!firstCat) firstCat = catId;

        // Tab button
        const btn = document.createElement("button");
        btn.className = "tab-btn";
        btn.dataset.cat = catId;
        btn.innerHTML = `<span class="tab-dot" style="background:${escHtml(cat.color)}"></span>${escHtml(cat.icon)} ${escHtml(cat.label)}`;
        btn.addEventListener("click", () => activateTab(catId));
        tabBar.appendChild(btn);

        // Panel
        const panel = document.createElement("div");
        panel.className = "tab-panel";
        panel.dataset.cat = catId;

        // Panel header
        const header = document.createElement("div");
        header.className = "panel-header";
        header.innerHTML = `
          <span class="panel-icon">${escHtml(cat.icon)}</span>
          <div>
            <div class="panel-title" style="color:${escHtml(cat.color)}">${escHtml(cat.label)}</div>
            <div class="panel-sub">${escHtml(CAT_SUBS[catId] || "")}</div>
          </div>`;
        panel.appendChild(header);

        // Summary
        if (cat.summary) {
          const box = document.createElement("div");
          box.className = "summary-box";
          box.innerHTML = `<div class="summary-label">✦ KI-Zusammenfassung</div><div class="summary-text">${escHtml(cat.summary)}</div>`;
          panel.appendChild(box);
        }

        // News list
        const list = document.createElement("div");
        if (!cat.items || cat.items.length === 0) {
          list.innerHTML = `<div class="empty">Keine Meldungen für diese Woche gefunden.</div>`;
        } else {
          cat.items.forEach(item => {
            const el = document.createElement("div");
            el.className = "news-item";
            const titleHtml = item.link
              ? `<a class="news-title" href="${escHtml(item.link)}" target="_blank" rel="noopener">${escHtml(item.title)}</a>`
              : `<span class="news-title">${escHtml(item.title)}</span>`;
            el.innerHTML = titleHtml + `
              <div class="news-meta">
                ${item.source ? `<span class="news-source">${escHtml(item.source)}</span>` : ""}
                ${item.date   ? `<span class="news-date">${escHtml(item.date)}</span>`     : ""}
              </div>`;
            list.appendChild(el);
          });
        }
        panel.appendChild(list);
        panels.appendChild(panel);
      }

      if (firstCat) activateTab(firstCat);

    } catch (err) {
      document.getElementById("panels").innerHTML =
        `<div class="empty" style="padding:60px">⚠️ Daten konnten nicht geladen werden.<br><small style="color:#bbb;margin-top:8px;display:block">${err.message}</small></div>`;
    }
  }

  load();
</script>
</body>
</html>

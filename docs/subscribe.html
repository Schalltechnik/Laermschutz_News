<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter abonnieren – Lärmschutz News</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #1a5c38; --green-dark: #133f28; --green-light: #e8f2ec; --border: #d4e4d4; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f4f0; color: #1a1a1a; min-height: 100vh; padding: 40px 20px 80px; }
    .page { max-width: 600px; margin: 0 auto; }
    .back { display: inline-block; margin-bottom: 24px; font-size: 13px; color: var(--green); text-decoration: none; }
    .back:hover { text-decoration: underline; }

    .card { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 16px rgba(26,92,56,0.08); }
    .card-header { background: var(--green); color: #fff; padding: 24px 32px 20px; }
    .card-header .kw { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
    .card-header h1 { font-family: 'DM Serif Display', serif; font-weight: 400; font-size: 22px; line-height: 1.3; margin-bottom: 4px; }
    .card-header p { font-size: 12px; color: rgba(255,255,255,0.65); }
    .card-body { padding: 0; }

    /* The Brevo iframe fills the card body */
    .brevo-iframe {
      width: 100%;
      min-height: 600px;
      border: none;
      display: block;
    }

    .note { padding: 16px 32px 24px; font-size: 12px; color: #aaa; line-height: 1.5; border-top: 1px solid var(--border); }

    @media (max-width: 500px) { .card-header { padding-left: 20px; padding-right: 20px; } .note { padding-left: 20px; padding-right: 20px; } }
  </style>
</head>
<body>
<div class="page">
  <a class="back" href="index.html">← Zurück zur Übersicht</a>

  <div class="card">
    <div class="card-header">
      <div class="kw">✉️ Lärmschutz News</div>
      <h1>Newsletter abonnieren</h1>
      <p>Wöchentlich oder monatlich – direkt in Ihr Postfach</p>
    </div>
    <div class="card-body">
      <iframe
        class="brevo-iframe"
        src="https://5b4f17db.sibforms.com/serve/MUIFAFuFKPC-jbR1cqN-aMFHEMQd4F3R2Vc6d_vGU-1uFHX6Uq0Zi-XyeszMb9sWwsdej94zw5Jeuf-wy6oVpclptfGdSSraacxUm505l7a3avyffNK2YyWXO5bytB1D-WGLwLSucmzcc7IHmjEI0a1hMacN1U2p8HQIK_J-ZFXcb9zW5Rb6GYXsDskNBLj_JDnBXXs79-TVdEukxw=="
        frameborder="0"
        scrolling="auto"
        allowfullscreen
        title="Newsletter Anmeldung"
      ></iframe>
    </div>
    <div class="note">
      Ihre E-Mail-Adresse wird ausschließlich für diesen Newsletter verwendet und nicht weitergegeben.
      Abmeldung jederzeit möglich.
    </div>
  </div>
</div>
</body>
</html>
